version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: supportdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supportdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supportdesk}
      POSTGRES_DB: ${POSTGRES_DB:-supportdesk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - supportdesk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supportdesk} -d ${POSTGRES_DB:-supportdesk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: supportdesk_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-supportdesk}:${POSTGRES_PASSWORD:-supportdesk}@postgres:5432/${POSTGRES_DB:-supportdesk}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      API_PORT: 3333
    ports:
      - "3333:3333"

volumes:
  supportdesk_pgdata:
